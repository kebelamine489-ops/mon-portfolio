<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" type="image/png" href="favicon.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site Pro - Version Master</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BASES & COULEURS --- */
        body {
            background-color: #f0f2f5; 
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: #2c3e50;
            transition: background-color 0.4s, color 0.4s; /* Transition douce pour le mode sombre */
        }

        /* --- HEADER FIXE --- */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        nav a { color: #bdc3c7; margin: 0 15px; text-decoration: none; }

        /* --- IMAGE VITRINE --- */
        .photo-vitrine { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .photo-vitrine img { width: 100%; height: auto; border-radius: 15px; }

        /* --- CONTENU --- */
        main { max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; }

        .conteneur { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .boite { background: white; padding: 20px; flex: 1; border-radius: 12px; box-shadow: 0px 5px 15px rgba(0,0,0,0.05); }

        /* --- FORMULAIRE --- */
        .contact-section { background: white; padding: 30px; border-radius: 15px; margin-top: 40px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .bouton-envoi { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; }

        /* --- STYLE MODE SOMBRE --- */
        body.dark-mode { background-color: #1a1a1a; color: #f0f2f5; }
        body.dark-mode .boite, body.dark-mode .contact-section { background-color: #2d2d2d; color: white; }
        body.dark-mode input, body.dark-mode textarea { background-color: #3d3d3d; color: white; border-color: #444; }
    </style>
</head>
<body>

    <header>
        <h1>Chargement...</h1> <nav>
            <a href="#">Accueil</a>
            <a href="#">Projets</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="photo-vitrine">
        <img src="images/fond-header.jpg" alt="Mon projet">
    </section>

    <main>
        <button id="bouton-mode" style="padding: 10px 20px; border-radius: 20px; cursor: pointer; border: none; background: #2c3e50; color: white; margin-bottom: 20px;">
            🌙 Mode Sombre
        </button>
     <div class="boite">
    <img src="https://images.pexels.com/photos/7191174/pexels-photo-7191174.jpeg" alt="Projet" style="width:100%; border-radius:8px; height:150px; object-fit:cover;">
    <h3>Projet1</h3>
    <p>voici mon projet.</p>
</div>
        <section class="contact-section">
            <h2>Me contacter</h2>
            <form>
                <input type="text" placeholder="Nom">
                <input type="email" placeholder="Email">
                <textarea placeholder="Message"></textarea>
                <button type="submit" class="bouton-envoi">Envoyer</button>
            </form>
        </section>
    </main>

    <footer style="text-align: center; padding: 40px; color: #7f8c8d;">
        &copy; 2026 - Apprentissage JavaScript
    </footer>

    <script>
        // 1. GESTION DU MESSAGE DE BIENVENUE
        const titre = document.querySelector('header h1');
        const heure = new Date().getHours();
        
        if (heure >= 18) {
            titre.innerText = "Bonsoir ! Bienvenue";
        } else {
            titre.innerText = "Bonjour ! Bienvenue";
        }

        // 2. GESTION DU MODE SOMBRE
        const btn = document.getElementById('bouton-mode');
        const corps = document.body;

        btn.addEventListener('click', function() {
            corps.classList.toggle('dark-mode');
            
            if (corps.classList.contains('dark-mode')) {
                btn.innerText = "☀️ Mode Clair";
                btn.style.background = "#f1c40f";
                btn.style.color = "#2c3e50";
            } else {
                btn.innerText = "🌙 Mode Sombre";
                btn.style.background = "#2c3e50";
                btn.style.color = "white";
            }
        });
    </script>
</body>
</html>
